<script type="module">
    import CanvasDragDrop from "./canvasDragDrop.js";

    let canvas = document.getElementById('canvas');
    let cdd = new CanvasDragDrop({
      el: canvas,
      ctx: canvas.getContext('2d'),
      offset: {
        x: 30,
        y: 30
      }
    });

    // cdd.addDragDropElement({

    //   ctx.fillRect(el.x, el.y, el.width, el.height);
    //   ctx.restore();
    // });
    //
    cdd.addDragDropElement({
      x: 150,
      y: 250,
      width: 100,
      height: 200
    }, (ctx, el) => {
      ctx.save();
      ctx.fillStyle = 'rgb(0, 255, 0)';
      ctx.fillRect(el.x, el.y, el.width, el.height);
      ctx.restore();
    });

    cdd.addTextElement({
      x: 250,
      y: 200,
      text: 'Hello world'
    }, (ctx, el) => {
      ctx.save();
      ctx.fillStyle = el.fontColor;
      ctx.font = el.font;
      ctx.textBaseline = el.textBaseline;

      ctx.fillText(el.text, el.x, el.y, el.width);

      ctx.restore();
    });
